name: Deploy to Firebase

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & Build
        run: npm run build

      - name: Unit tests
        run: npm run test:run

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v13.29.1
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Comment on merged PR
        if: github.event_name == 'push' && success()
        uses: actions/github-script@v7
        with:
          script: |
            // Find the PR that was merged into this push
            const commits = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = commits.data.filter(pr => pr.merged_at);
            for (const pr of merged) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `🍋 **Deployed!** This PR was successfully deployed to Firebase Hosting.\n\nCommit: \`${context.sha.slice(0, 7)}\`\nWorkflow: [${context.workflow} #${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
            }
