            - paragraph [ref=e1608]: ORO VERDE 101 is a bilingual cartel-dynasty pilot that confidently establishes three orphaned siblings fighting for control of Mexico's largest avocado empire after their dying matriarch disinherits them, only to discover the fortune was built on a blood pact with a cartel lord who has come to collect. The script earns its strongest marks for a razor-sharp inciting incident, a devastating double-reversal climax, emotionally rich goosebumps moments (the childhood flashback and deathbed speech are genuinely exceptional), and a star-vehicle protagonist whose moral corruption arc channels Succession's Kendall Roy through a distinctly Mexican lens. It falls short of a RECOMMEND due to one critical structural flaw — the pilot's most consequential escalation (Ernesto's murder) is driven by a random external event rather than a traceable character choice, undermining the moral argument at its foundation — and secondary issues including an underdeveloped corporate antagonist and an AI bluff that needs stronger setup. This is a strong CONSIDER with a clear path to RECOMMEND through targeted structural revision; the writing talent, thematic ambition, and star-role potential are evident and the project merits development engagement.
